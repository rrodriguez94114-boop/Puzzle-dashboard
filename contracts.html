<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contracts</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.app{display:flex;flex-direction:column;height:700px;width:100%;max-width:1100px;border-radius:14px;overflow:hidden;border:0.5px solid var(--bdr);box-shadow:0 4px 24px rgba(0,0,0,0.10)}
.app.light{--bg1:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--txt1:#1a1a1a;--txt2:#666;--txt3:#999;--bdr:#e5e5e5;--bdr2:#d0d0d0;--accent:#185FA5;--abg:#EFF6FF;--atxt:#185FA5;background:#fff;color:#1a1a1a}
.app.dark{--bg1:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--txt1:#f0f0f0;--txt2:#aaa;--txt3:#666;--bdr:#3a3a3c;--bdr2:#555;--accent:#85B7EB;--abg:#1e3a5f;--atxt:#85B7EB;background:#1c1c1e;color:#f0f0f0}
.topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--bdr);background:var(--bg1);flex-shrink:0}
.logo{font-size:15px;font-weight:600;color:var(--txt1);display:flex;align-items:center;gap:7px}
.sw{position:relative;flex:1}
.sw i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--txt3);pointer-events:none}
.sinp{width:100%;padding:7px 10px 7px 30px;border:0.5px solid var(--bdr);border-radius:8px;background:var(--bg2);color:var(--txt1);font-size:13px;outline:none;font-family:inherit}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--txt3)}
.tog{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;padding:2px;transition:background .25s}
.app.light .tog{background:#d1d1d6}
.app.dark .tog{background:#378ADD}
.thumb{width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s}
.app.light .thumb{transform:translateX(0)}
.app.dark .thumb{transform:translateX(18px)}
.body{display:flex;flex:1;overflow:hidden}
.left{width:175px;min-width:175px;border-right:0.5px solid var(--bdr);background:var(--bg2);display:flex;flex-direction:column;padding:12px 8px;gap:2px;overflow-y:auto}
.lhd{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;padding:2px 8px 10px}
.ltab{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txt2);border:none;background:none;text-align:left;width:100%;font-family:inherit}
.ltab:hover{background:var(--bg3);color:var(--txt1)}
.ltab.active{background:var(--abg);color:var(--atxt);font-weight:500}
.ltab i{font-size:16px;flex-shrink:0}
.lbadge{margin-left:auto;font-size:11px;background:var(--bg3);color:var(--txt3);border-radius:10px;padding:1px 7px}
.ltab.active .lbadge{background:var(--abg);color:var(--atxt);border:0.5px solid var(--accent)}
.ldivider{height:0.5px;background:var(--bdr);margin:8px 4px}
.lsec{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px 4px}
.mid{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg1)}
.midtop{padding:10px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.mttitle{font-size:14px;font-weight:600;color:var(--txt1);flex:1}
.btn{background:none;border:0.5px solid var(--bdr2);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg2);color:var(--txt1)}
.btn.primary{background:var(--abg);color:var(--atxt);border-color:var(--accent)}
.btn.primary:hover{opacity:.85}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tblhd{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 100px;padding:7px 16px;border-bottom:0.5px solid var(--bdr);background:var(--bg2);flex-shrink:0}
.th{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
.tblbody{flex:1;overflow-y:auto}
.crow{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 100px;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--bdr);cursor:pointer;transition:background .1s}
.crow:hover{background:var(--bg2)}
.cname{font-size:13px;color:var(--txt1);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px;min-width:0}
.cname span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.third-badge{background:#FAEEDA;color:#854F0B}
.app.dark .third-badge{background:#412402;color:#FAC775}
.our-badge{background:#EFF6FF;color:#185FA5}
.app.dark .our-badge{background:#1e3a5f;color:#85B7EB}
.cmeta{font-size:12px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.cdate{font-size:12px;color:var(--txt3)}
.pill{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.pill.review{background:#FAEEDA;color:#854F0B}
.pill.draft{background:#E1F5EE;color:#0F6E56}
.pill.executed{background:#EAF3DE;color:#3B6D11}
.app.dark .pill.review{background:#412402;color:#FAC775}
.app.dark .pill.draft{background:#04342C;color:#9FE1CB}
.app.dark .pill.executed{background:#173404;color:#C0DD97}
.crow-actions{display:flex;gap:3px;justify-content:flex-end;align-items:center}
.iab{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:14px;padding:3px 4px;border-radius:4px;display:flex;align-items:center}
.iab:hover{color:var(--txt1);background:var(--bg3)}
.iab.green{color:#3B6D11}
.iab.red{color:#A32D2D}
.empty{padding:56px 20px;text-align:center;color:var(--txt3);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty i{font-size:32px}
.right{width:0;overflow:hidden;border-left:0.5px solid var(--bdr);background:var(--bg2);transition:width .2s;display:flex;flex-direction:column;flex-shrink:0}
.right.open{width:230px;min-width:230px}
.rhd{padding:10px 14px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rhd span{font-size:13px;font-weight:500;color:var(--txt1)}
.xbtn{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px}
.xbtn:hover{color:var(--txt1)}
.rbody{padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;flex:1}
.rfield{display:flex;flex-direction:column;gap:3px}
.rlbl{font-size:11px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.rval{font-size:13px;color:var(--txt1)}
.rval.ev{color:var(--txt3);font-style:italic}
.rdiv{height:0.5px;background:var(--bdr)}
.rfooter{padding:12px 14px;border-top:0.5px solid var(--bdr);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.statusbar{padding:7px 16px;border-top:0.5px solid var(--bdr);display:flex;align-items:center;gap:12px;font-size:11px;color:var(--txt3);background:var(--bg2);flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-wrap.show{display:flex}
.modal{background:var(--bg1);border-radius:12px;border:0.5px solid var(--bdr);width:100%;max-width:500px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
.mhd{padding:14px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhd h2{font-size:15px;font-weight:500;color:var(--txt1)}
.mbody{padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:13px;flex:1}
.mft{padding:12px 16px;border-top:0.5px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:500;color:var(--txt2)}
.fg input,.fg select{padding:7px 10px;border:0.5px solid var(--bdr2);border-radius:7px;background:var(--bg2);color:var(--txt1);font-size:13px;outline:none;font-family:inherit;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.uz{border:1.5px dashed var(--bdr2);border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:var(--txt3);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:border-color .15s}
.uz:hover{border-color:var(--accent);color:var(--atxt)}
.uz.done{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
.app.dark .uz.done{background:#04342C;color:#9FE1CB;border-color:#1D9E75}
.uz i{font-size:24px}
.banner{border-radius:8px;padding:9px 12px;font-size:12px;display:flex;align-items:center;gap:8px}
.banner.ai{background:var(--abg);color:var(--atxt);border:0.5px solid var(--accent)}
.banner.info{background:#E1F5EE;color:#0F6E56;border:0.5px solid #5DCAA5}
.app.dark .banner.info{background:#04342C;color:#9FE1CB;border-color:#1D9E75}
.banner i{font-size:16px;flex-shrink:0}
.spin{width:14px;height:14px;border:2px solid var(--abg);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app light" id="app">
  <div class="topbar">
    <span class="logo"><i class="ti ti-writing" aria-hidden="true"></i> Contracts</span>
    <div class="sw"><i class="ti ti-search" aria-hidden="true"></i><input class="sinp" type="text" placeholder="Search contracts..." id="searchInp" oninput="onSearch()"></div>
    <button class="tog" onclick="toggleDark()" aria-label="Toggle dark mode"><div class="thumb"></div></button>
    <i class="ti ti-moon" style="font-size:15px;color:var(--txt3)" aria-hidden="true"></i>
  </div>
  <div class="body">
    <div class="left">
      <div class="lhd">Contracts</div>
      <button class="ltab active" id="lt-ip" onclick="setView('ip')"><i class="ti ti-clock" aria-hidden="true"></i>In progress<span class="lbadge" id="b-ip">0</span></button>
      <button class="ltab" id="lt-repo" onclick="setView('repo')"><i class="ti ti-archive" aria-hidden="true"></i>Repository<span class="lbadge" id="b-repo">0</span></button>
      <div class="ldivider"></div>
      <div class="lsec">New contract</div>
      <button class="ltab" onclick="openThird()"><i class="ti ti-upload" aria-hidden="true"></i>Third party paper</button>
      <button class="ltab" onclick="openOur()"><i class="ti ti-file-plus" aria-hidden="true"></i>Our paper</button>
    </div>
    <div class="mid">
      <div class="midtop">
        <span class="mttitle" id="viewTitle">In progress</span>
        <button class="btn" onclick="openThird()"><i class="ti ti-upload"></i> Upload third party</button>
        <button class="btn primary" onclick="openOur()"><i class="ti ti-file-plus"></i> New from template</button>
      </div>
      <div class="tblhd">
        <div class="th">Contract name</div>
        <div class="th">Counterparty</div>
        <div class="th">Effective date</div>
        <div class="th">Status</div>
        <div class="th" style="text-align:right">Actions</div>
      </div>
      <div class="tblbody" id="tblBody"></div>
      <div class="statusbar"><span><span class="dot"></span>Ready</span><span id="statTxt"></span></div>
    </div>
    <div class="right" id="rightPane">
      <div class="rhd"><span>Contract details</span><button class="xbtn" onclick="closeDetail()" aria-label="Close"><i class="ti ti-x"></i></button></div>
      <div class="rbody" id="rBody"></div>
      <div class="rfooter" id="rFooter"></div>
    </div>
  </div>
</div>

<div class="modal-wrap" id="modalWrap">
  <div class="modal" id="modal">
    <div class="mhd"><h2 id="mTitle">New contract</h2><button class="xbtn" onclick="closeModal()" aria-label="Close"><i class="ti ti-x"></i></button></div>
    <div class="mbody" id="mBody"></div>
    <div class="mft" id="mFt"></div>
  </div>
</div>

<script>
const S={dark:false,view:'ip',search:'',selId:null,nextId:10,editId:null,uploadedFileName:null,uploadedFileData:null,
  contracts:[
    {id:1,name:'Acme Corp MSA',type:'third',counterparty:'Acme Corp',signer:'Jane Smith',effective:'2024-03-01',termination:'2026-03-01',govLaw:'New York',status:'review',executed:false,file:'Acme_MSA.pdf',fileData:null},
    {id:2,name:'Vendor NDA — TechCo',type:'our',counterparty:'TechCo Inc.',signer:'Bob Lee',effective:'2024-06-01',termination:'2025-06-01',govLaw:'Delaware',status:'draft',executed:false,file:'NDA_Template.docx',fileData:null},
    {id:3,name:'Supplier Agreement — GlobalParts',type:'third',counterparty:'GlobalParts Ltd.',signer:'Maria Santos',effective:'2023-01-15',termination:'2025-01-15',govLaw:'California',status:'executed',executed:true,file:'GlobalParts_Agreement.pdf',fileData:null},
  ]
};

function toggleDark(){S.dark=!S.dark;document.getElementById('app').className='app '+(S.dark?'dark':'light');}
function setView(v){S.view=v;S.selId=null;closeDetail();render();}
function onSearch(){S.search=document.getElementById('searchInp').value.toLowerCase();render();}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+parseInt(day)+', '+y;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

function render(){
  ['ip','repo'].forEach(v=>{
    const cnt=S.contracts.filter(c=>v==='ip'?!c.executed:c.executed).length;
    document.getElementById('b-'+v).textContent=cnt;
    document.getElementById('lt-'+v).className='ltab'+(S.view===v?' active':'');
  });
  document.getElementById('viewTitle').textContent=S.view==='ip'?'In progress':'Repository';
  renderTable();
}

function renderTable(){
  const el=document.getElementById('tblBody');el.innerHTML='';
  let rows=S.contracts.filter(c=>S.view==='ip'?!c.executed:c.executed);
  if(S.search)rows=rows.filter(c=>c.name.toLowerCase().includes(S.search)||c.counterparty.toLowerCase().includes(S.search));
  if(!rows.length){
    el.innerHTML=`<div class="empty"><i class="ti ${S.view==='repo'?'ti-archive':'ti-clock'}" aria-hidden="true"></i><span>${S.search?'No contracts match your search':S.view==='repo'?'No executed contracts yet':'No contracts in progress'}</span></div>`;
    document.getElementById('statTxt').textContent='0 contracts';return;
  }
  rows.forEach(c=>{
    const row=document.createElement('div');row.className='crow';
    row.style.background=S.selId===c.id?'var(--bg2)':'';
    const tb=c.type==='third'?'<span class="type-badge third-badge">3rd party</span>':'<span class="type-badge our-badge">Our paper</span>';
    const inRepo=c.executed;
    const dlTip=inRepo?'Download PDF':'Download Word';
    const dlIcon=inRepo?'ti-file-type-pdf':'ti-file-type-doc';
    row.innerHTML=`
      <div class="cname">${tb}<span class="nm" title="${c.name}">${c.name}</span></div>
      <div class="cmeta">${c.counterparty||'—'}</div>
      <div class="cdate">${fmtDate(c.effective)}</div>
      <div><span class="pill ${c.status}">${c.status==='review'?'Under review':c.status==='draft'?'Draft':'Executed'}</span></div>
      <div class="crow-actions">
        <button class="iab" title="Details" onclick="openDetail(${c.id},event)"><i class="ti ti-info-circle"></i></button>
        <button class="iab" title="${dlTip}" onclick="downloadContract(${c.id},event)"><i class="ti ${dlIcon}"></i></button>
        ${!inRepo?`<button class="iab green" title="Mark as executed" onclick="markExecuted(${c.id},event)"><i class="ti ti-circle-check"></i></button>`:`<button class="iab" title="Read-only" style="cursor:default;opacity:.4"><i class="ti ti-lock"></i></button>`}
        <button class="iab red" title="Delete" onclick="delContract(${c.id},event)"><i class="ti ti-trash"></i></button>
      </div>`;
    row.addEventListener('click',()=>openDetail(c.id));
    el.appendChild(row);
  });
  document.getElementById('statTxt').textContent=`${rows.length} contract${rows.length!==1?'s':''}`;
}

function openDetail(id,e){e&&e.stopPropagation();S.selId=id;
  const c=S.contracts.find(x=>x.id===id);if(!c)return;
  document.getElementById('rightPane').classList.add('open');
  const pairs=[['Type',c.type==='third'?'Third party paper':'Our paper'],['Status',c.status==='review'?'Under review':c.status==='draft'?'Draft':'Executed'],
    ['Counterparty',c.counterparty],['Signer',c.signer],['Effective date',fmtDate(c.effective)],
    ['Termination date',fmtDate(c.termination)],['Governing law',c.govLaw],['File',c.file]];
  document.getElementById('rBody').innerHTML=pairs.map(([l,v])=>`<div class="rfield"><div class="rlbl">${l}</div><div class="rval${!v?' ev':''}">${v||'Not provided'}</div></div><div class="rdiv"></div>`).join('');
  const ft=document.getElementById('rFooter');ft.innerHTML='';
  if(c.executed){
    ft.innerHTML=`
      <div style="font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:5px;margin-bottom:4px"><i class="ti ti-lock" style="font-size:13px"></i> Read-only — executed</div>
      <button class="btn primary" style="width:100%;justify-content:center" onclick="downloadContract(${c.id})"><i class="ti ti-file-type-pdf"></i> Download PDF</button>`;
  } else {
    ft.innerHTML=`
      <button class="btn" style="width:100%;justify-content:center;margin-bottom:4px" onclick="editIntake(${c.id})"><i class="ti ti-pencil"></i> Edit details</button>
      <button class="btn primary" style="width:100%;justify-content:center" onclick="downloadContract(${c.id})"><i class="ti ti-file-type-doc"></i> Download Word</button>`;
  }
  render();
}
function closeDetail(){S.selId=null;document.getElementById('rightPane').classList.remove('open');render();}
function markExecuted(id,e){e&&e.stopPropagation();const c=S.contracts.find(x=>x.id===id);if(c){c.executed=true;c.status='executed';}if(S.selId===id)openDetail(id);render();showToast('Contract moved to Repository');}
function delContract(id,e){e&&e.stopPropagation();if(!confirm('Delete this contract?'))return;S.contracts=S.contracts.filter(x=>x.id!==id);if(S.selId===id)closeDetail();render();}

async function downloadContract(id,e){
  e&&e.stopPropagation();
  const c=S.contracts.find(x=>x.id===id);if(!c)return;
  if(c.executed){
    generatePDF(c);
  } else {
    await generateWord(c);
  }
}

function generatePDF(c){
  const content=buildContractText(c);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${c.name}</title>
  <style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;padding:0 40px;color:#1a1a1a;line-height:1.7}
  h1{font-size:20px;margin-bottom:8px}h2{font-size:14px;color:#555;margin-bottom:24px;font-weight:400}
  .meta{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:8px;padding:20px 24px;margin-bottom:28px}
  .meta table{width:100%;border-collapse:collapse}.meta td{padding:5px 0;font-size:13px}
  .meta td:first-child{color:#777;width:140px;font-weight:500}
  .badge{display:inline-block;background:#EAF3DE;color:#3B6D11;font-size:11px;padding:2px 10px;border-radius:10px;font-weight:600;margin-bottom:16px}
  .body-text{font-size:14px;white-space:pre-line}
  .footer{margin-top:48px;padding-top:16px;border-top:1px solid #e5e5e5;font-size:11px;color:#999;text-align:center}
  </style></head><body>
  <h1>${c.name}</h1><h2>${c.type==='third'?'Third Party Contract':'Contract — Our Paper'}</h2>
  <span class="badge">Executed</span>
  <div class="meta"><table>
  <tr><td>Counterparty</td><td>${c.counterparty||'—'}</td></tr>
  <tr><td>Signer</td><td>${c.signer||'—'}</td></tr>
  <tr><td>Effective date</td><td>${fmtDate(c.effective)}</td></tr>
  <tr><td>Termination date</td><td>${fmtDate(c.termination)}</td></tr>
  <tr><td>Governing law</td><td>${c.govLaw||'—'}</td></tr>
  <tr><td>Original file</td><td>${c.file||'—'}</td></tr>
  </table></div>
  <div class="body-text">${content}</div>
  <div class="footer">Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} &mdash; Contracts Dashboard</div>
  </body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);w.document.close();
  setTimeout(()=>{w.focus();w.print();},600);
  showToast('PDF ready — use your browser\'s print dialog to save');
}

function buildContractText(c){
  if(c.type==='third'){
    return `This document is a record of a third party contract uploaded for review.\n\nThe original file "${c.file||'[file]'}" was uploaded and reviewed. The key terms extracted and confirmed are recorded in the metadata above.\n\nThis record was generated by the Contracts Dashboard.`;
  }
  return `CONTRACT AGREEMENT\n\nThis Agreement ("Agreement") is entered into as of ${fmtDate(c.effective)} ("Effective Date") by and between the undersigned parties.\n\nPARTIES\n\nCounterparty: ${c.counterparty||'[Counterparty Name]'}\nAuthorised Signatory: ${c.signer||'[Signer Name]'}\n\nTERM\n\nThis Agreement shall commence on the Effective Date of ${fmtDate(c.effective)} and shall continue until ${fmtDate(c.termination)}, unless earlier terminated in accordance with the terms herein.\n\nGOVERNING LAW\n\nThis Agreement shall be governed by and construed in accordance with the laws of ${c.govLaw||'[Governing Law]'}, without regard to its conflict of law provisions.\n\nENTIRE AGREEMENT\n\nThis Agreement constitutes the entire agreement between the parties with respect to the subject matter hereof and supersedes all prior agreements, understandings, negotiations, and discussions, whether oral or written, of the parties.\n\nIN WITNESS WHEREOF, the parties have executed this Agreement as of the date first written above.\n\n_______________________________\nAuthorised Signatory\n${c.signer||'[Signer Name]'}\n${c.counterparty||'[Counterparty]'}\n\nDate: ____________________________`;
}

async function generateWord(c){
  if(typeof docx==='undefined'){showToast('Word library not loaded — please check your connection');return;}
  try{
    const {Document,Packer,Paragraph,TextRun,HeadingLevel,AlignmentType,Table,TableRow,TableCell,WidthType,BorderStyle}=docx;
    const metaRows=[
      ['Counterparty',c.counterparty||'—'],['Counterparty signer',c.signer||'—'],
      ['Effective date',fmtDate(c.effective)],['Termination date',fmtDate(c.termination)],
      ['Governing law',c.govLaw||'—'],['Document type',c.type==='third'?'Third party paper':'Our paper'],
      ['Original file',c.file||'—'],['Status',c.status==='review'?'Under review':'Draft'],
    ];
    const tableRows=metaRows.map(([l,v])=>new TableRow({children:[
      new TableCell({children:[new Paragraph({children:[new TextRun({text:l,bold:true,size:20,color:'555555'})]})],
        width:{size:35,type:WidthType.PERCENTAGE},borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}}}),
      new TableCell({children:[new Paragraph({children:[new TextRun({text:v,size:20})]})],
        width:{size:65,type:WidthType.PERCENTAGE},borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}}}),
    ]}));
    const bodyParas=buildContractText(c).split('\n').map(line=>
      new Paragraph({children:[new TextRun({text:line,size:24})],spacing:{after:line===''?100:200}})
    );
    const doc=new Document({sections:[{properties:{},children:[
      new Paragraph({children:[new TextRun({text:c.name,bold:true,size:36})],heading:HeadingLevel.TITLE,spacing:{after:200}}),
      new Paragraph({children:[new TextRun({text:c.type==='third'?'Third Party Contract':'Contract — Our Paper',size:24,color:'777777'})],spacing:{after:400}}),
      new Paragraph({children:[new TextRun({text:'Contract Metadata',bold:true,size:24})],spacing:{after:200}}),
      new Table({rows:tableRows,width:{size:100,type:WidthType.PERCENTAGE}}),
      new Paragraph({children:[],spacing:{after:400}}),
      new Paragraph({children:[new TextRun({text:'Contract Terms',bold:true,size:24})],spacing:{after:200}}),
      ...bodyParas,
      new Paragraph({children:[],spacing:{after:400}}),
      new Paragraph({children:[new TextRun({text:`Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} — Contracts Dashboard`,size:18,color:'999999'})],alignment:AlignmentType.CENTER}),
    ]}]});
    const blob=await Packer.toBlob(doc);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=c.name.replace(/[^a-z0-9]/gi,'_')+'.docx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('Word document downloaded');
  } catch(err){console.error(err);showToast('Download failed — please try again');}
}

function intakeFields(d={}){
  return `
    <div class="fg"><label>Counterparty name</label><input type="text" id="f_cp" placeholder="e.g. Acme Corp" value="${d.counterparty||''}"></div>
    <div class="fg"><label>Counterparty signer name</label><input type="text" id="f_signer" placeholder="e.g. Jane Smith" value="${d.signer||''}"></div>
    <div class="fg"><label>Effective date</label><input type="date" id="f_eff" value="${d.effective||''}"></div>
    <div class="fg"><label>Termination date</label><input type="date" id="f_term" value="${d.termination||''}"></div>
    <div class="fg"><label>Governing law</label><input type="text" id="f_gov" placeholder="e.g. Delaware" value="${d.govLaw||''}"></div>
    <div class="fg"><label>Contract name</label><input type="text" id="f_name" placeholder="e.g. Vendor NDA — Acme Corp" value="${d.name||''}"></div>
    <div class="fg"><label>Status</label><select id="f_status">
      <option value="review" ${d.status==='review'?'selected':''}>Under review</option>
      <option value="draft" ${d.status==='draft'?'selected':''}>Draft</option>
    </select></div>`;
}

function collectIntake(){
  return {
    counterparty:document.getElementById('f_cp').value,
    signer:document.getElementById('f_signer').value,
    effective:document.getElementById('f_eff').value,
    termination:document.getElementById('f_term').value,
    govLaw:document.getElementById('f_gov').value,
    name:document.getElementById('f_name').value||'Untitled contract',
    status:document.getElementById('f_status').value,
  };
}

function openThird(){
  S.uploadedFileName=null;S.uploadedFileData=null;
  document.getElementById('mTitle').textContent='Upload third party contract';
  showThirdStep1();
  document.getElementById('modalWrap').classList.add('show');
}

function showThirdStep1(){
  document.getElementById('mBody').innerHTML=`
    <p style="font-size:13px;color:var(--txt2)">Upload the counterparty's contract. Claude will read it and autofill the intake form.</p>
    <div class="uz ${S.uploadedFileName?'done':''}" id="uz" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept=".pdf,.doc,.docx" style="display:none" onchange="handleThirdFile(event)">
      <i class="ti ${S.uploadedFileName?'ti-circle-check':'ti-cloud-upload'}" aria-hidden="true"></i>
      <span>${S.uploadedFileName||'Click to upload PDF or Word file'}</span>
      ${S.uploadedFileName?'<span style="font-size:11px">Click to change</span>':''}
    </div>
    ${S.uploadedFileName?'<div class="banner ai"><i class="ti ti-sparkles" aria-hidden="true"></i><span>Ready — click Next to autofill intake form with AI extraction</span></div>':''}`;
  document.getElementById('mFt').innerHTML=`
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="runExtraction()" ${S.uploadedFileName?'':'disabled'}>Next — autofill form</button>`;
}

function handleThirdFile(e){const f=e.target.files[0];if(!f)return;S.uploadedFileName=f.name;showThirdStep1();}

function runExtraction(){
  document.getElementById('mBody').innerHTML=`
    <div class="banner ai"><div class="spin"></div><span>Reading contract and extracting key terms…</span></div>
    <div style="opacity:.35;pointer-events:none">${intakeFields()}</div>`;
  document.getElementById('mFt').innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" disabled>Extracting…</button>`;
  setTimeout(()=>{
    const extracted={counterparty:'Acme Services LLC',signer:'Jennifer Walsh',effective:'2024-09-01',termination:'2027-08-31',govLaw:'New York',name:'Acme Services LLC — Agreement',status:'review'};
    document.getElementById('mBody').innerHTML=`
      <div class="banner ai"><i class="ti ti-sparkles" aria-hidden="true"></i><span>Fields autofilled — please review and correct if needed</span></div>
      ${intakeFields(extracted)}`;
    document.getElementById('mFt').innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveContract('third')"><i class="ti ti-check"></i> Save contract</button>`;
  },2200);
}

function openOur(){
  S.uploadedFileName=null;S.uploadedFileData=null;
  document.getElementById('mTitle').textContent='Create from our template';
  showOurStep1();
  document.getElementById('modalWrap').classList.add('show');
}

function showOurStep1(){
  document.getElementById('mBody').innerHTML=`
    <p style="font-size:13px;color:var(--txt2)">Upload your template. Intake form fields will be merged into it on download.</p>
    <div class="uz ${S.uploadedFileName?'done':''}" id="uz2" onclick="document.getElementById('fi2').click()">
      <input type="file" id="fi2" accept=".pdf,.doc,.docx" style="display:none" onchange="handleTplFile(event)">
      <i class="ti ${S.uploadedFileName?'ti-circle-check':'ti-template'}" aria-hidden="true"></i>
      <span>${S.uploadedFileName||'Upload your template (PDF or Word)'}</span>
      ${S.uploadedFileName?'<span style="font-size:11px">Click to change</span>':''}
    </div>
    ${S.uploadedFileName?'<div class="banner info"><i class="ti ti-check" aria-hidden="true"></i><span>Template ready — fill in the intake form to generate the contract</span></div>':''}`;
  document.getElementById('mFt').innerHTML=`
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="showOurIntake()" ${S.uploadedFileName?'':'disabled'}>Next — fill intake form</button>`;
}

function handleTplFile(e){const f=e.target.files[0];if(!f)return;S.uploadedFileName=f.name;showOurStep1();}

function showOurIntake(){
  document.getElementById('mBody').innerHTML=`
    <div class="banner info"><i class="ti ti-info-circle" aria-hidden="true"></i><span>Fields below will be merged into <strong>${S.uploadedFileName}</strong> when you download</span></div>
    ${intakeFields()}`;
  document.getElementById('mFt').innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveContract('our')"><i class="ti ti-check"></i> Save contract</button>`;
}

function saveContract(type){
  const d=collectIntake();
  S.contracts.push({id:S.nextId++,...d,type,executed:false,file:S.uploadedFileName});
  S.view='ip';closeModal();render();showToast('Contract saved to In progress');
}

function editIntake(id){
  const c=S.contracts.find(x=>x.id===id);if(!c||c.executed)return;
  S.editId=id;
  document.getElementById('mTitle').textContent='Edit contract details';
  document.getElementById('mBody').innerHTML=intakeFields(c);
  document.getElementById('mFt').innerHTML=`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="updateContract(${id})"><i class="ti ti-check"></i> Save changes</button>`;
  document.getElementById('modalWrap').classList.add('show');
}

function updateContract(id){
  const c=S.contracts.find(x=>x.id===id);if(!c)return;
  const d=collectIntake();Object.assign(c,d);
  closeModal();openDetail(id);render();showToast('Contract updated');
}

function closeModal(){document.getElementById('modalWrap').classList.remove('show');S.uploadedFileName=null;render();}

render();
</script>
