<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CorpTeam Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.app{display:flex;flex-direction:column;height:700px;width:100%;max-width:1200px;border-radius:14px;overflow:hidden;border:0.5px solid var(--bdr);box-shadow:0 4px 24px rgba(0,0,0,0.10)}
.app.light{--bg1:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--txt1:#1a1a1a;--txt2:#666;--txt3:#999;--bdr:#e5e5e5;--bdr2:#d0d0d0;--accent:#185FA5;--abg:#EFF6FF;--atxt:#185FA5;--folder:#EF9F27;background:#fff;color:#1a1a1a}
.app.dark{--bg1:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--txt1:#f0f0f0;--txt2:#aaa;--txt3:#666;--bdr:#3a3a3c;--bdr2:#555;--accent:#85B7EB;--abg:#1e3a5f;--atxt:#85B7EB;--folder:#FAC775;background:#1c1c1e;color:#f0f0f0}
/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--bdr);background:var(--bg1);flex-shrink:0}
.logo{font-size:15px;font-weight:600;color:var(--txt1);display:flex;align-items:center;gap:7px;margin-right:4px}
.sw{position:relative;flex:1}.sw i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--txt3);pointer-events:none}
.sinp{width:100%;padding:7px 10px 7px 30px;border:0.5px solid var(--bdr);border-radius:8px;background:var(--bg2);color:var(--txt1);font-size:13px;outline:none;font-family:inherit}
.sinp:focus{border-color:var(--accent)}.sinp::placeholder{color:var(--txt3)}
.tog{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;padding:2px;transition:background .25s}
.app.light .tog{background:#d1d1d6}.app.dark .tog{background:#378ADD}
.thumb{width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s}
.app.light .thumb{transform:translateX(0)}.app.dark .thumb{transform:translateX(18px)}
/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden}
/* ── LEFT NAV ── */
.left{width:175px;min-width:175px;border-right:0.5px solid var(--bdr);background:var(--bg2);display:flex;flex-direction:column;padding:12px 8px;gap:2px;overflow-y:auto}
.lhd{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;padding:2px 8px 10px}
.lnav{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txt2);border:none;background:none;text-align:left;width:100%;font-family:inherit;font-weight:500}
.lnav:hover{background:var(--bg3);color:var(--txt1)}.lnav.active{background:var(--abg);color:var(--atxt)}
.lnav i{font-size:16px;flex-shrink:0}
.ldivider{height:0.5px;background:var(--bdr);margin:8px 4px}
.ltab{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--txt2);border:none;background:none;text-align:left;width:100%;font-family:inherit}
.ltab:hover{background:var(--bg3);color:var(--txt1)}.ltab.active{background:var(--abg);color:var(--atxt);font-weight:500}
.ltab i{font-size:16px;flex-shrink:0}
.lbadge{margin-left:auto;font-size:11px;background:var(--bg3);color:var(--txt3);border-radius:10px;padding:1px 7px}
.ltab.active .lbadge{background:var(--abg);color:var(--atxt);border:0.5px solid var(--accent)}
.lsec{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px 4px}
/* ── MAIN PANEL ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg1)}
.midtop{padding:10px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.mttitle{font-size:14px;font-weight:600;color:var(--txt1);flex:1}
.btn{background:none;border:0.5px solid var(--bdr2);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg2);color:var(--txt1)}.btn.primary{background:var(--abg);color:var(--atxt);border-color:var(--accent)}.btn.primary:hover{opacity:.85}.btn:disabled{opacity:.45;cursor:not-allowed}
.iab{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:14px;padding:3px 4px;border-radius:4px;display:flex;align-items:center}
.iab:hover{color:var(--txt1);background:var(--bg3)}.iab.green{color:#3B6D11}.iab.red{color:#A32D2D}
/* ── DOCUMENTS FILE TREE ── */
.doc-panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
.doc-toolbar{padding:10px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0}
.doc-bc{flex:1;font-size:13px;color:var(--txt2);display:flex;align-items:center;gap:4px}
.doc-bc .cur{color:var(--txt1);font-weight:500}
.view-tog{display:flex;border:0.5px solid var(--bdr);border-radius:7px;overflow:hidden}
.vbtn{background:none;border:none;padding:5px 8px;cursor:pointer;color:var(--txt3);font-size:14px}
.vbtn.active{background:var(--bg2);color:var(--txt1)}
.tree-hd{display:grid;grid-template-columns:1fr 130px 130px;padding:7px 16px;border-bottom:0.5px solid var(--bdr);background:var(--bg2);flex-shrink:0}
.tree-hd span{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none}
.tree-hd span:hover{color:var(--txt1)}
.tree-body{flex:1;overflow-y:auto;padding:4px 8px}
.trow{display:grid;grid-template-columns:1fr 130px 130px;align-items:center;padding:7px 8px;border-radius:7px;cursor:pointer}
.trow:hover{background:var(--bg2)}
.trow.active-row{background:var(--abg)}
.trow.dragging{opacity:.4}
.trow.drag-over{background:var(--abg);outline:1.5px dashed var(--accent)}
.tcell-name{display:flex;align-items:center;gap:6px;overflow:hidden;min-width:0}
.tcell-name span{font-size:13px;color:var(--txt1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow.active-row .tcell-name span{color:var(--atxt)}
.tcell-date{font-size:12px;color:var(--txt3)}
.tcell-owner{display:flex;align-items:center;gap:6px}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.owner-nm{font-size:12px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-actions{display:flex;gap:2px;opacity:0;margin-left:auto;flex-shrink:0}
.trow:hover .row-actions{opacity:1}
.folder-icon{color:var(--folder);font-size:16px;flex-shrink:0}
.file-icon{font-size:15px;flex-shrink:0}
.chev{font-size:11px;color:var(--txt3);width:14px;flex-shrink:0}
.rename-inp{background:var(--bg1);border:0.5px solid var(--accent);border-radius:4px;padding:2px 6px;font-size:13px;color:var(--txt1);outline:none;font-family:inherit;flex:1;min-width:0}
/* ── GRID VIEW ── */
.grid-body{flex:1;overflow-y:auto;padding:16px}
.grid-section-lbl{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:20px}
.fc{background:var(--bg2);border:0.5px solid var(--bdr);border-radius:8px;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;position:relative;transition:border-color .15s}
.fc:hover{border-color:var(--bdr2)}.fc.active-fc{border-color:var(--accent);background:var(--abg)}
.fc.drag-over-fc{border-color:var(--accent);background:var(--abg)}
.fc i{font-size:20px;color:var(--folder)}.fc.active-fc i{color:var(--atxt)}
.fc-name{font-size:12px;font-weight:500;color:var(--txt1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-ct{font-size:11px;color:var(--txt3)}
.fc-actions{display:flex;gap:2px;opacity:0;position:absolute;top:5px;right:5px}
.fc:hover .fc-actions{opacity:1}
.file-list-grid{display:flex;flex-direction:column;gap:1px}
.frow-grid{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer}
.frow-grid:hover{background:var(--bg2)}
.frow-grid-name{font-size:13px;color:var(--txt1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.frow-grid-date{font-size:11px;color:var(--txt3);width:70px;text-align:right;flex-shrink:0}
.frow-grid-actions{display:flex;gap:2px;opacity:0;flex-shrink:0}
.frow-grid:hover .frow-grid-actions{opacity:1}
/* ── DROPZONE ── */
.dropzone{border:1.5px dashed var(--bdr2);border-radius:10px;padding:40px 20px;text-align:center;color:var(--txt3);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:10px;margin:16px}
.dropzone i{font-size:28px}.dropzone.dragover{border-color:var(--accent);background:var(--abg);color:var(--atxt)}
/* ── PREVIEW PANEL ── */
.preview-panel{width:0;overflow:hidden;border-left:0.5px solid var(--bdr);background:var(--bg2);transition:width .2s;display:flex;flex-direction:column;flex-shrink:0}
.preview-panel.open{width:220px;min-width:220px}
.pp-hd{padding:10px 14px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pp-hd span{font-size:13px;font-weight:500;color:var(--txt1)}
.pp-body{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1}
.pp-icon{width:60px;height:60px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin:0 auto}
.pp-name{font-size:12px;font-weight:500;color:var(--txt1);text-align:center;word-break:break-word}
.pp-meta{display:flex;flex-direction:column;gap:5px}
.pp-row{display:flex;justify-content:space-between;font-size:11px}
.pp-lbl{color:var(--txt3)}.pp-val{color:var(--txt1);font-weight:500}
/* ── STATUS BAR ── */
.statusbar{padding:7px 16px;border-top:0.5px solid var(--bdr);display:flex;align-items:center;gap:12px;font-size:11px;color:var(--txt3);background:var(--bg2);flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
/* ── CONTRACTS (reused) ── */
.tblhd{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 120px;padding:7px 16px;border-bottom:0.5px solid var(--bdr);background:var(--bg2);flex-shrink:0}
.th{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
.tblbody{flex:1;overflow-y:auto}
.crow{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 120px;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--bdr);cursor:pointer;transition:background .1s}
.crow:hover{background:var(--bg2)}
.cname{font-size:13px;color:var(--txt1);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px;min-width:0}
.cname span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.third-badge{background:#FAEEDA;color:#854F0B}.app.dark .third-badge{background:#412402;color:#FAC775}
.our-badge{background:#EFF6FF;color:#185FA5}.app.dark .our-badge{background:#1e3a5f;color:#85B7EB}
.advisor-badge{background:#E1F5EE;color:#0F6E56}.app.dark .advisor-badge{background:#04342C;color:#9FE1CB}
.cmeta{font-size:12px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.cdate{font-size:12px;color:var(--txt3)}
.pill{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.pill.review{background:#FAEEDA;color:#854F0B}.pill.draft{background:#E1F5EE;color:#0F6E56}.pill.executed{background:#EAF3DE;color:#3B6D11}
.app.dark .pill.review{background:#412402;color:#FAC775}.app.dark .pill.draft{background:#04342C;color:#9FE1CB}.app.dark .pill.executed{background:#173404;color:#C0DD97}
.crow-actions{display:flex;gap:3px;justify-content:flex-end;align-items:center}
.empty{padding:56px 20px;text-align:center;color:var(--txt3);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty i{font-size:32px}
.right{width:0;overflow:hidden;border-left:0.5px solid var(--bdr);background:var(--bg2);transition:width .2s;display:flex;flex-direction:column;flex-shrink:0}
.right.open{width:230px;min-width:230px}
.rhd{padding:10px 14px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rhd span{font-size:13px;font-weight:500;color:var(--txt1)}
.xbtn{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px}.xbtn:hover{color:var(--txt1)}
.rbody{padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;flex:1}
.rfield{display:flex;flex-direction:column;gap:3px}
.rlbl{font-size:11px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.rval{font-size:13px;color:var(--txt1)}.rval.ev{color:var(--txt3);font-style:italic}
.rdiv{height:0.5px;background:var(--bdr)}
.rfooter{padding:12px 14px;border-top:0.5px solid var(--bdr);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
/* ── MODAL ── */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-wrap.show{display:flex}
.modal{background:#fff;border-radius:12px;border:0.5px solid #d0d0d0;box-shadow:0 8px 40px rgba(0,0,0,0.18);width:100%;max-width:520px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.app.dark .modal{background:#1c1c1e;border-color:#3a3a3c}
.mhd{padding:14px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#f8f8f8;border-radius:12px 12px 0 0}
.app.dark .mhd{background:#2c2c2e;border-bottom-color:#3a3a3c}
.mhd h2{font-size:15px;font-weight:600;color:#1a1a1a}
.app.dark .mhd h2{color:#f0f0f0}
.mbody{padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:13px;flex:1;background:#fff}
.app.dark .mbody{background:#1c1c1e}
.mft{padding:12px 16px;border-top:1px solid #e5e5e5;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:#f8f8f8}
.app.dark .mft{background:#2c2c2e;border-top-color:#3a3a3c}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:600;color:#444}
.app.dark .fg label{color:#bbb}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1px solid #d0d0d0;border-radius:7px;background:#fff;color:#1a1a1a;font-size:13px;outline:none;font-family:inherit;width:100%;box-shadow:inset 0 1px 2px rgba(0,0,0,0.04)}
.app.dark .fg input,.app.dark .fg select,.app.dark .fg textarea{background:#2c2c2e;border-color:#555;color:#f0f0f0;box-shadow:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
.fg textarea{resize:vertical;min-height:60px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.uz{border:1.5px dashed #d0d0d0;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#999;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:7px;background:#fff}
.uz:hover{border-color:#185FA5;color:#185FA5}.uz.done{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
.uz i{font-size:24px}
.banner{border-radius:8px;padding:9px 12px;font-size:12px;display:flex;align-items:center;gap:8px}
.banner.ai{background:var(--abg);color:var(--atxt);border:0.5px solid var(--accent)}
.banner.info{background:#E1F5EE;color:#0F6E56;border:0.5px solid #5DCAA5}
.app.dark .banner.info{background:#04342C;color:#9FE1CB;border-color:#1D9E75}
.banner i{font-size:16px;flex-shrink:0}
.spin{width:14px;height:14px;border:2px solid #cce0f5;border-top-color:#185FA5;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;padding-bottom:4px;border-bottom:1px solid #eee;margin-bottom:2px}
.app.dark .section-title{color:#666;border-bottom-color:#3a3a3c}
.auto-note{font-size:11px;color:#888;margin-top:2px;font-style:italic}
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.preview-overlay.show{display:flex}
.preview-doc{background:#fff;border-radius:12px;width:100%;max-width:800px;box-shadow:0 8px 48px rgba(0,0,0,0.22);display:flex;flex-direction:column}
.app.dark .preview-doc{background:#1c1c1e;border:0.5px solid #3a3a3c}
.preview-doc-hd{padding:14px 20px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#f8f8f8;border-radius:12px 12px 0 0}
.app.dark .preview-doc-hd{background:#2c2c2e;border-bottom-color:#3a3a3c}
.preview-doc-hd h2{font-size:14px;font-weight:600;color:#1a1a1a}
.app.dark .preview-doc-hd h2{color:#f0f0f0}
.preview-doc-hd-actions{display:flex;gap:8px;align-items:center}
.preview-meta{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:8px;margin:20px 24px 0;padding:14px 18px}
.app.dark .preview-meta{background:#2c2c2e;border-color:#3a3a3c}
.preview-meta table{width:100%;border-collapse:collapse}
.preview-meta td{padding:4px 0;font-size:12px;color:#1a1a1a}
.app.dark .preview-meta td{color:#f0f0f0}
.preview-meta td:first-child{color:#777;width:150px;font-weight:600}
.preview-body-text{padding:20px 24px 32px;font-family:"Times New Roman",Georgia,serif;font-size:11pt;line-height:1.7;color:#1a1a1a}
.app.dark .preview-body-text{color:#e0e0e0}
.preview-sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin:20px 24px 32px}
.preview-sig-block .company{font-weight:bold;font-size:11pt;margin-bottom:12px;font-family:"Times New Roman",Georgia,serif}
.preview-sig-line{border-bottom:1px solid #555;height:1px;margin:20px 0 6px}
.preview-sig-block p{font-size:10.5pt;margin:3px 0;font-family:"Times New Roman",Georgia,serif;color:#1a1a1a}
.app.dark .preview-sig-block p{color:#e0e0e0}
.docusign-tag{display:inline-block;background:#FAEEDA;color:#854F0B;border:1px solid #EF9F27;border-radius:4px;font-size:10px;padding:1px 5px;font-family:monospace}
.app.dark .docusign-tag{background:#412402;color:#FAC775;border-color:#EF9F27}
.tpl-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #d0d0d0;border-radius:9px;background:#fff;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:border-color .15s}
.tpl-btn:hover{border-color:#185FA5}
.app.dark .tpl-btn{background:#2c2c2e;border-color:#3a3a3c;color:#f0f0f0}
.app.dark .tpl-btn:hover{border-color:#85B7EB}
/* ── DOC VIEWER ── */
.doc-viewer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:center;justify-content:center;padding:40px}
.doc-viewer-overlay.show{display:flex}
.doc-viewer{background:#fff;border-radius:12px;width:100%;max-width:700px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 48px rgba(0,0,0,0.3)}
.app.dark .doc-viewer{background:#1c1c1e}
.dv-hd{padding:12px 16px;border-bottom:0.5px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;background:#f8f8f8;flex-shrink:0}
.app.dark .dv-hd{background:#2c2c2e;border-bottom-color:#3a3a3c}
.dv-hd span{font-size:13px;font-weight:600;color:#1a1a1a}
.app.dark .dv-hd span{color:#f0f0f0}
.dv-body{padding:24px;overflow-y:auto;flex:1;font-family:"Times New Roman",Georgia,serif;font-size:11pt;line-height:1.7;color:#1a1a1a}
.app.dark .dv-body{color:#e0e0e0}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app light" id="app">
  <div class="topbar">
    <span class="logo"><i class="ti ti-building" aria-hidden="true"></i> CorpTeam</span>
    <div class="sw"><i class="ti ti-search" aria-hidden="true"></i><input class="sinp" type="text" placeholder="Search..." id="searchInp" oninput="onSearch()"></div>
    <button class="tog" onclick="toggleDark()" aria-label="Toggle dark mode"><div class="thumb"></div></button>
    <i class="ti ti-moon" style="font-size:15px;color:var(--txt3)" aria-hidden="true"></i>
  </div>
  <div class="body">
    <!-- LEFT NAV -->
    <div class="left">
      <div class="lhd">Workspace</div>
      <button class="lnav active" id="nav-docs" onclick="setSection('docs')"><i class="ti ti-files"></i>Documents</button>
      <button class="lnav" id="nav-contracts" onclick="setSection('contracts')"><i class="ti ti-writing"></i>Contracts</button>
      <!-- Contracts sub-nav (shown when contracts active) -->
      <div id="contracts-subnav" style="display:none;flex-direction:column;gap:2px;margin-top:4px">
        <div class="ldivider"></div>
        <button class="ltab active" id="lt-ip" onclick="setView('ip')"><i class="ti ti-clock"></i>In progress<span class="lbadge" id="b-ip">0</span></button>
        <button class="ltab" id="lt-repo" onclick="setView('repo')"><i class="ti ti-archive"></i>Repository<span class="lbadge" id="b-repo">0</span></button>
        <div class="ldivider"></div>
        <div class="lsec">New contract</div>
        <button class="ltab" onclick="openThird()"><i class="ti ti-upload"></i>Third party</button>
        <button class="ltab" onclick="openTemplatePicker()"><i class="ti ti-file-plus"></i>From template</button>
      </div>
    </div>

    <!-- MAIN AREA (switches between docs and contracts) -->
    <div class="main" id="mainArea">
      <!-- Documents panel -->
      <div id="docsPanel" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="doc-toolbar">
          <div class="doc-bc" id="docBc"><button onclick="docGoHome()" style="background:none;border:none;cursor:pointer;color:var(--txt2);display:flex;align-items:center;gap:4px;font-family:inherit;font-size:13px;padding:0"><i class="ti ti-home" style="font-size:13px"></i></button><span id="docBcPath"></span></div>
          <div class="view-tog">
            <button class="vbtn active" id="vbtn-list" onclick="setDocView('list')" title="List view"><i class="ti ti-layout-list"></i></button>
            <button class="vbtn" id="vbtn-grid" onclick="setDocView('grid')" title="Grid view"><i class="ti ti-layout-grid"></i></button>
          </div>
          <button class="btn" onclick="createDocFolder()"><i class="ti ti-folder-plus"></i> New folder</button>
          <label class="btn primary" for="docFileInp"><i class="ti ti-upload"></i> Upload</label>
          <input type="file" id="docFileInp" multiple style="display:none" onchange="handleDocUpload(event)">
        </div>
        <!-- List view headers -->
        <div class="tree-hd" id="docTreeHd">
          <span onclick="docSortBy('name')">Name <i class="ti ti-arrows-sort" style="font-size:10px"></i></span>
          <span onclick="docSortBy('date')">Date modified <i class="ti ti-arrows-sort" style="font-size:10px"></i></span>
          <span>Owner</span>
        </div>
        <div id="docContent" style="flex:1;overflow-y:auto"></div>
        <div class="statusbar"><span><span class="dot"></span>Ready</span><span id="docStat"></span></div>
      </div>
      <!-- Contracts panel -->
      <div id="contractsPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="midtop">
          <span class="mttitle" id="viewTitle">In progress</span>
          <button class="btn" onclick="openThird()"><i class="ti ti-upload"></i> Upload third party</button>
          <button class="btn primary" onclick="openTemplatePicker()"><i class="ti ti-file-plus"></i> New from template</button>
        </div>
        <div class="tblhd">
          <div class="th">Contract name</div><div class="th">Counterparty</div>
          <div class="th">Effective date</div><div class="th">Status</div>
          <div class="th" style="text-align:right">Actions</div>
        </div>
        <div class="tblbody" id="tblBody"></div>
        <div class="statusbar"><span><span class="dot"></span>Ready</span><span id="statTxt"></span></div>
      </div>
    </div>

    <!-- Docs preview panel -->
    <div class="preview-panel" id="docPreviewPanel">
      <div class="pp-hd"><span>Details</span><button class="xbtn" onclick="closeDocPreview()"><i class="ti ti-x"></i></button></div>
      <div class="pp-body" id="docPreviewBody"></div>
    </div>

    <!-- Contracts detail panel -->
    <div class="right" id="rightPane">
      <div class="rhd"><span>Contract details</span><button class="xbtn" onclick="closeDetail()"><i class="ti ti-x"></i></button></div>
      <div class="rbody" id="rBody"></div>
      <div class="rfooter" id="rFooter"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <div class="mhd"><h2 id="mTitle">New</h2><button class="xbtn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="mbody" id="mBody"></div>
    <div class="mft" id="mFt"></div>
  </div>
</div>

<!-- Contract preview overlay -->
<div class="preview-overlay" id="previewOverlay" onclick="closePreviewOverlay(event)">
  <div class="preview-doc" id="previewDoc">
    <div class="preview-doc-hd">
      <h2 id="previewDocTitle">Contract Preview</h2>
      <div class="preview-doc-hd-actions">
        <button class="btn" id="previewDlBtn" onclick="previewDownload()"><i class="ti ti-download"></i> Download</button>
        <button class="xbtn" onclick="closePreviewOverlayDirect()"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div id="previewDocBody"></div>
  </div>
</div>

<!-- Document viewer overlay -->
<div class="doc-viewer-overlay" id="docViewerOverlay" onclick="closeDocViewer(event)">
  <div class="doc-viewer">
    <div class="dv-hd">
      <span id="dvTitle">Document</span>
      <button class="xbtn" onclick="closeDocViewerDirect()"><i class="ti ti-x"></i></button>
    </div>
    <div class="dv-body" id="dvBody"></div>
  </div>
</div>

function toggleDark(){S.dark=!S.dark;document.getElementById('app').className='app '+(S.dark?'dark':'light');}
function setView(v){S.view=v;S.selId=null;closeDetail();render();}
function onSearch(){S.search=document.getElementById('searchInp').value.toLowerCase();render();}

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(d){if(!d)return'\u2014';const[y,m,day]=d.split('-');return MONTHS[parseInt(m)-1]+' '+parseInt(day)+', '+y;}
function calcTermination(eff){if(!eff)return'';const d=new Date(eff+'T12:00:00');d.setFullYear(d.getFullYear()+5);return d.toISOString().slice(0,10);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function render(){
  ['ip','repo'].forEach(v=>{
    const cnt=S.contracts.filter(c=>v==='ip'?!c.executed:c.executed).length;
    document.getElementById('b-'+v).textContent=cnt;
    document.getElementById('lt-'+v).className='ltab'+(S.view===v?' active':'');
  });
  document.getElementById('viewTitle').textContent=S.view==='ip'?'In progress':'Repository';
  renderTable();
}

function renderTable(){
  const el=document.getElementById('tblBody');el.innerHTML='';
  let rows=S.contracts.filter(c=>S.view==='ip'?!c.executed:c.executed);
  if(S.search)rows=rows.filter(c=>c.name.toLowerCase().includes(S.search)||c.counterparty.toLowerCase().includes(S.search));
  if(!rows.length){
    el.innerHTML=`<div class="empty"><i class="ti ${S.view==='repo'?'ti-archive':'ti-clock'}"></i><span>${S.search?'No contracts match your search':S.view==='repo'?'No executed contracts yet':'No contracts in progress'}</span></div>`;
    document.getElementById('statTxt').textContent='0 contracts';return;
  }
  rows.forEach(c=>{
    const row=document.createElement('div');row.className='crow';
    row.style.background=S.selId===c.id?'var(--bg2)':'';
    const tb=c.type==='third'
      ?'<span class="type-badge third-badge">3rd party</span>'
      :c.templateType==='advisor'
        ?'<span class="type-badge advisor-badge">Advisor</span>'
        :'<span class="type-badge our-badge">NDA</span>';
    const inRepo=c.executed;
    row.innerHTML=`
      <div class="cname">${tb}<span class="nm" title="${c.name}">${c.name}</span></div>
      <div class="cmeta">${c.counterparty||'\u2014'}</div>
      <div class="cdate">${fmtDate(c.effective)}</div>
      <div><span class="pill ${c.status}">${c.status==='review'?'Under review':c.status==='draft'?'Draft':'Executed'}</span></div>
      <div class="crow-actions">
        <button class="iab" title="Details" onclick="openDetail(${c.id},event)"><i class="ti ti-info-circle"></i></button>
        <button class="iab" title="Preview" onclick="openPreviewOverlay(${c.id},event)"><i class="ti ti-eye"></i></button>
        <button class="iab" title="${inRepo?'Download PDF':'Download Word'}" onclick="downloadContract(${c.id},event)"><i class="ti ${inRepo?'ti-file-type-pdf':'ti-file-type-doc'}"></i></button>

    html+='<div class="fg"><label>Number of shares *</label><input type="text" id="f_shares" placeholder="e.g. 10,000" value="'+sharesVal+'" oninput="formatShares(this)"></div>';
  }
  html+='<div class="section-title">Agreement terms</div>';
  html+='<div class="frow2">';
  html+='<div class="fg"><label>Effective date *</label><input type="date" id="f_eff" value="'+(d.effective||'')+'" oninput="autoTermination()"></div>';
  if(isAdvisor){

  }

function autoTermination(){

function formatShares(el){
  var raw=el.value.replace(/[^0-9]/g,'');

  el.value=Number(raw).toLocaleString();
}

function autoContractName(){
  const cp=document.getElementById('f_cp').value.trim();
  const nf=document.getElementById('f_name');
  if(nf&&(!nf.dataset.edited||nf.dataset.edited==='false')){
    nf.value=cp?(S.currentTemplate==='advisor'?'Advisor Agreement \u2014 '+cp:'Mutual Non-Disclosure Agreement with '+cp):'';
  }
}

function collectIntake(){

    signerTitle:document.getElementById('f_signerTitle').value.trim(),

async function downloadContract(id,e){
  e&&e.stopPropagation();
  const c=S.contracts.find(x=>x.id===id);if(!c)return;
  if(c.executed){downloadPDF(c);}else{await downloadWordMerged(c);}
}

async function downloadWordMerged(c){
  if(typeof JSZip==='undefined'){showToast('JSZip not loaded — check your internet connection');return;}
  showToast('Preparing Word document…');
  try{
    const isAdvisor=c.templateType==='advisor';
    const b64=isAdvisor?ADVISOR_TEMPLATE_B64:NDA_TEMPLATE_B64;
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    const zip=await JSZip.loadAsync(bytes);
    let xml=await zip.file('word/document.xml').async('string');
    const replacements={
      '[Effective Date]':fmtDate(c.effective),
      '[CorpTeam Signature]':c.corpSig||'Trevor Dutcher',
      '[Counterparty Signature]':c.signer||'',
      '[Counterparty Signer Name]':c.signer||'',
      '[Counterparty Signer Title]':c.signerTitle||'',
      '[Counterparty Signer Email]':c.signerEmail||'',
      '[Counterparty Address]':c.counterpartyAddress||'',
      '[Num of Shares]':c.numShares||'',
      '[Counterparty Phone Number]':c.counterpartyPhone||'',
    };
    for(const[k,v]of Object.entries(replacements))xml=xml.split(k).join(v);
    if(c.govLaw&&c.govLaw.toLowerCase()!=='delaware'){
      xml=xml.replace(/<w:t>Delaware<\/w:t>(<\/w:r>\s*<\/w:p>\s*<w:p)/,`<w:t>${c.govLaw}</w:t></w:r></w:p><w:p`);
    }
    zip.file('word/document.xml',xml);
    const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=c.name.replace(/[^a-z0-9]/gi,'_')+'.docx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('Word document downloaded');
  }catch(err){console.error(err);showToast('Download failed: '+err.message);}
}

function downloadPDF(c){
  const w=window.open('','_blank');

  setTimeout(()=>{w.focus();w.print();},600);

  body+='<p style="margin-bottom:14px;text-align:justify"><strong>3. Ownership.</strong> Company owns, and Advisor hereby assigns to Company, all works of authorship, technology, inventions, intellectual property and related rights (including all rights to priority and rights to file patent applications and/or registered designs) throughout the world that arise in whole or part out of, or in connection with, the Services or any Proprietary Information (\u201cInventions\u201d). Advisor waives all moral rights in and to such Inventions, and all similar rights under the laws of any jurisdiction, whether now existing or conferred in the future. Advisor agrees to, upon Company\u2019s request, execute and deliver to Company any documents deemed necessary by Company to perfect its rights in the Inventions.</p>';

  body+='<p style="margin-bottom:14px;text-align:justify;padding-left:24px">(a) With respect to any information that Advisor collects, receives, stores, processes, generates, uses, transfers, discloses, makes accessible, protects, secures, disposes of, and transmits (collectively, processes) in connection with the Services that relates to an identified or identifiable natural person or which otherwise constitutes personal data, personal information, personally identifiable information or similar information under applicable privacy or data security laws (collectively, \u201cPersonal Information\u201d), Advisor shall not (w) sell or share Personal Information, (x) retain, use or disclose Personal Information for any purpose other than the business purpose specified in this Agreement, (y) retain, use, or disclose the Personal Information outside of the direct business relationship between Advisor and Company, or (z) combine the Personal Information Advisor receives from, or on behalf of, Company with Personal Information that it receives from, or on behalf of, another person or persons, or collects from its own interaction with consumers. For the avoidance of doubt, the foregoing prohibits Advisor from \u201cselling\u201d Personal Information, as defined in the California Consumer Privacy Act of 2018 (as amended, the \u201cCCPA\u201d), and from retaining, using, or disclosing Personal Information outside of the direct business relationship between Advisor and Company or for a \u201ccommercial purpose\u201d (as defined in the CCPA). Company retains the right to take reasonable and appropriate steps to ensure that Advisor uses the Personal Information transferred in a manner consistent with Company\u2019s obligations under the CCPA. Advisor hereby certifies that it understands the obligations under this Section 5(a) and will comply with them.</p>';
  body+='<p style="margin-bottom:14px;text-align:justify;padding-left:24px">(b) Advisor shall comply with applicable obligations under the CCPA, as amended, and provide the same level of privacy protection as required for Company.</p>';
  body+='<p style="margin-bottom:14px;text-align:justify;padding-left:24px">(c) Advisor shall use reasonable security measures appropriate to the nature of any Personal Information in its possession or control to protect the Personal Information from unauthorized access, destruction, use, modification, or disclosure.</p>';

and attorneys\u2019 fees.</p>';

  document.getElementById('contractsPanel').style.display=sec==='contracts'?'flex':'none';
  document.getElementById('contracts-subnav').style.display=sec==='contracts'?'flex':'none';
  document.getElementById('docPreviewPanel').classList.remove('open');
  document.getElementById('rightPane').classList.remove('open');
  const si=document.getElementById('searchInp');
  si.placeholder=sec==='docs'?'Search documents...':'Search contracts...';
  si.value='';
  if(sec==='docs'){DS.search='';renderDocs();}
  else{S.search='';render();}
}

function onSearch(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  if(currentSection==='docs'){DS.search=q;renderDocs();}
  else{S.search=q;render();}
}

// Override toggleDark to keep both sections in sync
function toggleDark(){S.dark=!S.dark;document.getElementById('app').className='app '+(S.dark?'dark':'light');}

// ── DOC VIEW ─────────────────────────────────────────
function setDocView(v){
  DS.view=v;
  document.getElementById('vbtn-list').className='vbtn'+(v==='list'?' active':'');
  document.getElementById('vbtn-grid').className='vbtn'+(v==='grid'?' active':'');
  document.getElementById('docTreeHd').style.display=v==='list'?'grid':'none';
  renderDocs();
}

function docSortBy(col){if(DS.sortCol===col)DS.sortDir*=-1;else{DS.sortCol=col;DS.sortDir=1;}renderDocs();}

function updateDocBc(){
  const el=document.getElementById('docBcPath');
  if(!el)return;
  if(!DS.activeFolderId){el.innerHTML='';return;}
  // Build chain of folders from root to current
  let chain=[],cur=DS.folders.find(x=>x.id===DS.activeFolderId);
  while(cur){chain.unshift({id:cur.id,name:cur.name});cur=DS.folders.find(x=>x.id===cur.parentId);}
  // Build clickable breadcrumb segments
  let html='';
  chain.forEach(function(seg,i){
    html+='<span style="color:var(--txt3);margin:0 3px">/</span>';
    if(i<chain.length-1){
      html+='<button onclick="docGoTo('+seg.id+')" style="background:none;border:none;cursor:pointer;color:var(--txt2);font-size:13px;font-family:inherit;padding:0">'+seg.name+'</button>';
    } else {
      html+='<span style="color:var(--txt1);font-weight:500;font-size:13px">'+seg.name+'</span>';
    }
  });
  el.innerHTML=html;
}

function docGoHome(){
  DS.activeFolderId=null;
  // Close all folders
  DS.folders.forEach(function(f){f.open=false;});
  updateDocBc();renderDocs();closeDocPreview();
}

function docGoTo(folderId){
  // Navigate into folder (used by breadcrumb clicks)
  DS.activeFolderId=folderId;
  var cur=DS.folders.find(function(x){return x.id===folderId;});
  while(cur){cur.open=true;cur=DS.folders.find(function(x){return x.id===cur.parentId;});}
  updateDocBc();renderDocs();
}

function docToggleFolder(folderId){
  // Expand/collapse in place without navigating
  var f=DS.folders.find(function(x){return x.id===folderId;});
  if(f)f.open=!f.open;
  renderDocs();
}

// ── FOLDER CREATION ───────────────────────────────────
function createDocFolder(){
  if(DS.naming)return;DS.naming=true;
  const id=DS.nextId++;
  DS.folders.push({id,name:'',parentId:DS.activeFolderId,open:false,owner:0,date:todayStr()});
  renderDocs();
  setTimeout(()=>{
    const inp=document.getElementById('nfi-'+id);
    if(inp){inp.focus();inp.select();
      inp.onblur=()=>{DS.naming=false;const f=DS.folders.find(x=>x.id===id);if(f)f.name=inp.value.trim()||'Untitled folder';renderDocs();updateDocStat();};
      inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value='Untitled folder';inp.blur();}};
    }
  },30);
}

function todayStr(){return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}

// ── RENAME ────────────────────────────────────────────
function startDocRename(id,type,e){
  e&&e.stopPropagation();DS.renamingId=id;DS.renamingType=type;renderDocs();
  setTimeout(()=>{
    const inp=document.getElementById('dren-'+id);
    if(inp){inp.focus();
      if(type==='file'){const d=inp.value.lastIndexOf('.');inp.setSelectionRange(0,d>0?d:inp.value.length);}
      else inp.select();
      inp.onblur=()=>commitDocRename(id,type,inp.value);
      inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){DS.renamingId=null;renderDocs();}};
      inp.onclick=e=>e.stopPropagation();
    }
  },20);
}

function commitDocRename(id,type,val){
  if(type==='folder'){const f=DS.folders.find(x=>x.id===id);if(f)f.name=val.trim()||f.name;}
  else{const f=DS.files.find(x=>x.id===id);if(f)f.name=val.trim()||f.name;}
  DS.renamingId=null;DS.renamingType=null;renderDocs();
}

// ── DELETE ────────────────────────────────────────────
function deleteDocFolder(id,e){
  e&&e.stopPropagation();
  DS.folders.filter(f=>f.parentId===id).forEach(c=>deleteDocFolder(c.id));
  DS.files=DS.files.filter(f=>f.folderId!==id);
  DS.folders=DS.folders.filter(f=>f.id!==id);
  if(DS.activeFolderId===id){DS.activeFolderId=null;updateDocBc();}
  renderDocs();updateDocStat();
}
function deleteDocFile(id,e){e&&e.stopPropagation();DS.files=DS.files.filter(f=>f.id!==id);if(DS.selectedId===id)closeDocPreview();renderDocs();updateDocStat();}

// ── UPLOAD ────────────────────────────────────────────
function handleDocUpload(e){
  Array.from(e.target.files).forEach(file=>{
    const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':Math.round(file.size/1024)+' KB';
    DS.files.push({id:DS.nextId++,name:file.name,folderId:DS.activeFolderId,owner:0,date:todayStr(),size});
  });
  renderDocs();updateDocStat();e.target.value='';
}

// ── PREVIEW ───────────────────────────────────────────
function openDocPreview(item,type){
  DS.selectedId=item.id;
  const panel=document.getElementById('docPreviewPanel');
  panel.classList.add('open');
  const isFolder=type==='folder';
  const [icon,color]=isFolder?['ti-folder','var(--folder)']:docGetIcon(item.name);
  const owner=OWNERS[item.owner]||OWNERS[0];
  document.getElementById('docPreviewBody').innerHTML=
    '<div class="pp-icon"><i class="ti '+icon+'" style="color:'+color+';font-size:26px" aria-hidden="true"></i></div>'+
    '<div class="pp-name">'+item.name+'</div>'+
    '<div class="pp-meta">'+
    '<div class="pp-row"><span class="pp-lbl">Type</span><span class="pp-val">'+(isFolder?'Folder':(item.name.split('.').pop().toUpperCase()||'File'))+'</span></div>'+
    (!isFolder?'<div class="pp-row"><span class="pp-lbl">Size</span><span class="pp-val">'+(item.size||'—')+'</span></div>':'')+
    '<div class="pp-row"><span class="pp-lbl">Modified</span><span class="pp-val">'+(item.date||'—')+'</span></div>'+
    '<div class="pp-row"><span class="pp-lbl">Owner</span><span class="pp-val">'+owner.name+'</span></div>'+
    '</div>'+
    (!isFolder?'<button class="btn primary" style="width:100%;justify-content:center;margin-top:4px" onclick="viewDocument('+item.id+')"><i class="ti ti-eye"></i> View document</button>':'');
}
function closeDocPreview(){DS.selectedId=null;document.getElementById('docPreviewPanel').classList.remove('open');}

// ── DOCUMENT VIEWER ───────────────────────────────────
function viewDocument(id){
  const f=DS.files.find(x=>x.id===id);if(!f)return;
  document.getElementById('dvTitle').textContent=f.name;
  const [icon,color]=docGetIcon(f.name);
  document.getElementById('dvBody').innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0">'+
    '<i class="ti '+icon+'" style="font-size:48px;color:'+color+'" aria-hidden="true"></i>'+
    '<div style="font-size:15px;font-weight:500;color:var(--txt1)">'+f.name+'</div>'+
    '<div style="font-size:13px;color:var(--txt3)">'+f.size+' &nbsp;&bull;&nbsp; '+f.date+'</div>'+
    '<div style="font-size:13px;color:var(--txt2);text-align:center;max-width:400px;line-height:1.6">'+
    'Document preview is available when files are hosted on a server. '+
    'Download the file to view its contents, or integrate with Google Drive or SharePoint for inline previews.</div>'+
    '<button class="btn primary" style="margin-top:8px" onclick="closeDocViewerDirect()"><i class="ti ti-x"></i> Close</button>'+
    '</div>';
  document.getElementById('docViewerOverlay').classList.add('show');
}
function closeDocViewer(e){if(e.target===document.getElementById('docViewerOverlay'))closeDocViewerDirect();}
function closeDocViewerDirect(){document.getElementById('docViewerOverlay').classList.remove('show');}

// ── DRAG AND DROP ─────────────────────────────────────
function onDocDragStart(e,fileId){DS.draggingId=fileId;e.dataTransfer.effectAllowed='move';}
function onDocDropFolder(folderId,e){
  e.preventDefault();e.stopPropagation();
  if(DS.draggingId!==null){const f=DS.files.find(x=>x.id===DS.draggingId);if(f)f.folderId=folderId;DS.draggingId=null;}
  renderDocs();updateDocStat();
}

// ── STAT BAR ─────────────────────────────────────────
function updateDocStat(){
  const fc=DS.folders.length,fi=DS.files.length;
  document.getElementById('docStat').textContent=fc+' folders · '+fi+' files';
}

// ── RENDER ────────────────────────────────────────────
function renderDocs(){
  updateDocBc();
  if(DS.view==='list')renderDocsList();
  else renderDocsGrid();
  updateDocStat();
}

function renderDocsList(){
  const el=document.getElementById('docContent');el.innerHTML='';
  const q=DS.search;
  let folders,files;
  if(q){
    folders=DS.folders.filter(f=>f.name.toLowerCase().includes(q));
    files=DS.files.filter(f=>f.name.toLowerCase().includes(q));
  } else {
    folders=DS.activeFolderId===null?DS.folders.filter(f=>f.parentId===null):DS.folders.filter(f=>f.parentId===DS.activeFolderId);
    files=DS.files.filter(f=>f.folderId===DS.activeFolderId);
  }

  const sorted=(arr,key)=>[...arr].sort((a,b)=>{
    let av=a[key],bv=b[key];
    if(key==='owner'){av=OWNERS[a.owner]?.name||'';bv=OWNERS[b.owner]?.name||'';}
    return av<bv?-DS.sortDir:av>bv?DS.sortDir:0;
  });

  const frag=document.createDocumentFragment();
  const allFolders=sorted(folders,'name');
  const allFiles=sorted(files,DS.sortCol);

  function makeRow(item,type,depth){
    const isFolder=type==='folder';
    const hasKids=isFolder&&DS.folders.some(c=>c.parentId===item.id);
    const isRenaming=DS.renamingId===item.id&&DS.renamingType===type;
    const isNew=DS.naming&&isFolder&&item.name==='';
    const owner=OWNERS[item.owner]||OWNERS[0];

    const row=document.createElement('div');
    row.className='trow'+(DS.selectedId===item.id?' active-row':'');
    row.style.paddingLeft=(8+depth*20)+'px';

    // Name cell
    const nameCell=document.createElement('div');nameCell.className='tcell-name';
    if(isFolder){
      const hasContents=hasKids||DS.files.some(function(f){return f.folderId===item.id;});
      const chev=document.createElement('i');
      chev.className='ti '+(hasContents?(item.open?'ti-chevron-down':'ti-chevron-right'):'ti-chevron-right')+' chev';
      nameCell.appendChild(chev);
      const fi=document.createElement('i');fi.className='folder-icon ti '+(item.open&&hasKids?'ti-folder-open':'ti-folder');
      nameCell.appendChild(fi);
    } else {
      const[icon,color]=docGetIcon(item.name);
      const fi=document.createElement('i');fi.className='file-icon ti '+icon;fi.style.color=color;
      nameCell.appendChild(fi);
    }

    if(isNew){
      const inp=document.createElement('input');inp.className='rename-inp';inp.id='nfi-'+item.id;inp.placeholder='Folder name';
      nameCell.appendChild(inp);
    } else if(isRenaming){
      const inp=document.createElement('input');inp.className='rename-inp';inp.id='dren-'+item.id;inp.value=item.name;
      nameCell.appendChild(inp);
    } else {
      const nm=document.createElement('span');nm.textContent=item.name;nameCell.appendChild(nm);
      // Row actions
      const acts=document.createElement('div');acts.className='row-actions';
      const renBtn=document.createElement('button');renBtn.className='iab';renBtn.title='Rename';renBtn.innerHTML='<i class="ti ti-pencil"></i>';
      renBtn.onclick=e=>startDocRename(item.id,type,e);
      const delBtn=document.createElement('button');delBtn.className='iab red';delBtn.title='Delete';delBtn.innerHTML='<i class="ti ti-trash"></i>';
      delBtn.onclick=e=>isFolder?deleteDocFolder(item.id,e):deleteDocFile(item.id,e);
      if(!isFolder){
        const viewBtn=document.createElement('button');viewBtn.className='iab';viewBtn.title='View';viewBtn.innerHTML='<i class="ti ti-eye"></i>';
        viewBtn.onclick=e=>{e.stopPropagation();viewDocument(item.id);};
        acts.appendChild(viewBtn);
      }
      acts.appendChild(renBtn);acts.appendChild(delBtn);
      nameCell.appendChild(acts);
    }

    // Date cell
    const dateCell=document.createElement('div');dateCell.className='tcell-date';dateCell.textContent=item.date||'—';

    // Owner cell
    const ownerCell=document.createElement('div');ownerCell.className='tcell-owner';
    const av=document.createElement('div');av.className='avatar';
    av.style.background=owner.color;av.style.color=owner.tcolor;av.textContent=owner.initials;
    const on=document.createElement('span');on.className='owner-nm';on.textContent=owner.name;
    ownerCell.appendChild(av);ownerCell.appendChild(on);

    row.appendChild(nameCell);row.appendChild(dateCell);row.appendChild(ownerCell);

    if(!isNew&&!isRenaming){
      row.addEventListener('click',function(e){
        if(isFolder){
          docToggleFolder(item.id);
        } else {
          openDocPreview(item,'file');
        }
      });
      row.addEventListener('dblclick',function(e){
        startDocRename(item.id,type,e);
      });
      if(!isFolder){
        row.draggable=true;
        row.addEventListener('dragstart',e=>{onDocDragStart(e,item.id);row.classList.add('dragging');});
        row.addEventListener('dragend',()=>row.classList.remove('dragging'));
      }
      if(isFolder){
        row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('drag-over');});
        row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
        row.addEventListener('drop',e=>onDocDropFolder(item.id,e));
      }
    }
    return row;
  }

  // Render folders then files
  allFolders.forEach(f=>{
    frag.appendChild(makeRow(f,'folder',0));
    if(f.open&&!q){
      DS.folders.filter(c=>c.parentId===f.id).forEach(sf=>frag.appendChild(makeRow(sf,'folder',1)));
      DS.files.filter(fi=>fi.folderId===f.id).forEach(fi=>frag.appendChild(makeRow(fi,'file',1)));
    }
  });
  allFiles.forEach(f=>frag.appendChild(makeRow(f,'file',0)));

  if(!frag.childNodes.length){
    const dz=document.createElement('div');dz.className='dropzone';
    dz.innerHTML='<i class="ti ti-cloud-upload" aria-hidden="true"></i><span>'+(q?'No results found':'Drop files here or click Upload')+'</span>';
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');
      if(DS.draggingId){const f=DS.files.find(x=>x.id===DS.draggingId);if(f)f.folderId=DS.activeFolderId;DS.draggingId=null;renderDocs();}
    });
    el.appendChild(dz);return;
  }
  el.appendChild(frag);
}

function renderDocsGrid(){
  const el=document.getElementById('docContent');el.innerHTML='';
  const q=DS.search;
  let folders=q?DS.folders.filter(f=>f.name.toLowerCase().includes(q)):
    (DS.activeFolderId===null?DS.folders.filter(f=>f.parentId===null):DS.folders.filter(f=>f.parentId===DS.activeFolderId));
  let files=q?DS.files.filter(f=>f.name.toLowerCase().includes(q)):DS.files.filter(f=>f.folderId===DS.activeFolderId);

  const wrap=document.createElement('div');wrap.style.padding='16px';

  if(folders.length){
    const lbl=document.createElement('div');lbl.className='grid-section-lbl';lbl.textContent='Folders';wrap.appendChild(lbl);
    const grid=document.createElement('div');grid.className='folder-grid';
    folders.forEach(f=>{
      const fc=document.createElement('div');
      fc.className='fc'+(DS.activeFolderId===f.id?' active-fc':'');
      const ct=DS.files.filter(x=>x.folderId===f.id).length;
      fc.innerHTML='<div class="fc-actions">'+
        '<button class="iab" title="Rename" onclick="startDocRename('+f.id+',\'folder\',event)"><i class="ti ti-pencil"></i></button>'+
        '<button class="iab red" title="Delete" onclick="deleteDocFolder('+f.id+',event)"><i class="ti ti-trash"></i></button>'+
        '</div>'+
        '<i class="ti ti-folder" aria-hidden="true"></i>'+
        '<div class="fc-name">'+f.name+'</div>'+
        '<div class="fc-ct">'+ct+' file'+(ct!==1?'s':'')+'</div>';
      fc.addEventListener('click',function(){docToggleFolder(f.id);});
      fc.addEventListener('dblclick',function(e){startDocRename(f.id,'folder',e);});
      fc.addEventListener('dragover',e=>{e.preventDefault();fc.classList.add('drag-over-fc');});
      fc.addEventListener('dragleave',()=>fc.classList.remove('drag-over-fc'));
      fc.addEventListener('drop',e=>onDocDropFolder(f.id,e));
      grid.appendChild(fc);
    });
    wrap.appendChild(grid);
  }

  if(files.length){
    const lbl2=document.createElement('div');lbl2.className='grid-section-lbl';lbl2.textContent='Files';wrap.appendChild(lbl2);
    const list=document.createElement('div');list.className='file-list-grid';
    files.forEach(f=>{
      const[icon,color]=docGetIcon(f.name);
      const row=document.createElement('div');row.className='frow-grid';row.draggable=true;
      row.innerHTML='<i class="ti '+icon+'" style="color:'+color+';font-size:16px;flex-shrink:0" aria-hidden="true"></i>'+
        '<span class="frow-grid-name">'+f.name+'</span>'+
        '<span class="frow-grid-date">'+f.date+'</span>'+
        '<div class="frow-grid-actions">'+
        '<button class="iab" title="View" onclick="viewDocument('+f.id+');event.stopPropagation()"><i class="ti ti-eye"></i></button>'+
        '<button class="iab" title="Rename" onclick="startDocRename('+f.id+',\'file\',event)"><i class="ti ti-pencil"></i></button>'+
        '<button class="iab red" title="Delete" onclick="deleteDocFile('+f.id+',event)"><i class="ti ti-trash"></i></button>'+
        '</div>';
      row.addEventListener('click',()=>openDocPreview(f,'file'));
      row.addEventListener('dragstart',e=>{onDocDragStart(e,f.id);row.classList.add('dragging');});
      row.addEventListener('dragend',()=>row.classList.remove('dragging'));
      list.appendChild(row);
    });
    wrap.appendChild(list);
  }

  if(!folders.length&&!files.length){
    const dz=document.createElement('div');dz.className='dropzone';
    dz.innerHTML='<i class="ti ti-cloud-upload" aria-hidden="true"></i><span>'+(q?'No results found':'Drop files here or click Upload')+'</span>';
    wrap.appendChild(dz);
  }
  el.appendChild(wrap);
}

// ── INIT ─────────────────────────────────────────────
setSection('docs');
renderDocs();
</script>
</body>
</html>
